<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#f0fdf4">
<title>Plateo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
  --bg: #fafcfa;
  --white: #ffffff;
  --green-50: #f0fdf4;
  --green-100: #dcfce7;
  --green-200: #bbf7d0;
  --green-300: #86efac;
  --green-400: #4ade80;
  --green-500: #22c55e;
  --green-600: #16a34a;
  --green-700: #15803d;
  --green-800: #166534;
  --green-900: #14532d;

  --text: #1a1a2e;
  --text-2: #475569;
  --text-3: #94a3b8;

  --amber: #f59e0b;
  --amber-light: #fef3c7;
  --rose: #f43f5e;
  --rose-light: #fff1f2;
  --blue: #3b82f6;
  --blue-light: #eff6ff;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 4px 12px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.04);
  --shadow-md: 0 8px 24px rgba(0,0,0,.08), 0 4px 8px rgba(0,0,0,.04);
  --shadow-green: 0 4px 16px rgba(34,197,94,.15), 0 2px 4px rgba(34,197,94,.08);

  --font-h: 'Outfit', sans-serif;
  --font-b: 'Nunito', sans-serif;
  --r: 18px;
  --r-sm: 12px;
  --r-xl: 24px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: var(--font-b);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 80px;
  overflow-x: hidden;
  position: relative;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration:0s!important; transition-duration:0s!important; }
}

/* ===== TAB BAR ===== */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: rgba(255,255,255,.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid #e5e7eb;
  display: flex;
  padding: 6px 0 max(10px, env(safe-area-inset-bottom));
  z-index: 50;
}

.tb {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:6px 0; font-size:10px; font-weight:600; font-family:var(--font-b);
  color:var(--text-3); border:none; background:none; cursor:pointer;
  position:relative; min-height:44px; transition: color .15s ease;
}
.tb.on { color:var(--green-600); }
.tb.on::after {
  content:''; position:absolute; top:-6px; width:18px; height:2.5px;
  background: linear-gradient(90deg, var(--green-400), var(--green-600));
  border-radius:2px;
}
.tb i { width:20px; height:20px; stroke-width:1.8; pointer-events:none; }
.tb span { pointer-events:none; }

/* ===== PAGES ===== */
.pg { display:none; padding:20px 18px; position:relative; z-index:1; }
.pg.on { display:block; animation:pageIn .25s ease; }
@keyframes pageIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
@keyframes cardIn { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
.anim { animation:cardIn .3s ease both; }

/* ===== CARD ===== */
.card {
  background: var(--white);
  border-radius: var(--r);
  padding: 16px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(0,0,0,.04);
  transition: transform .15s ease, box-shadow .15s ease;
}
.card:active { transform: scale(.98); }
.card-xl { border-radius: var(--r-xl); }

/* ===== COMMON ===== */
.section-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.section-title { font-family:var(--font-h); font-size:20px; font-weight:700; color: var(--text); }
.section-action { font-size:13px; font-weight:700; color:var(--green-600); cursor:pointer; }
.section-label { font-family:var(--font-h); font-size:12px; font-weight:700; color:var(--green-600); text-transform:uppercase; letter-spacing:.06em; }

.back-row { display:flex; align-items:center; gap:10px; margin-bottom:22px; cursor:pointer; padding:4px 0; min-height:44px; }
.back-row i { width:20px; height:20px; color:var(--text-3); stroke-width:2; }
.back-title { font-family:var(--font-h); font-size:20px; font-weight:700; line-height:1.25; }

.top-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }

.icon-btn {
  background: var(--white); color:var(--text-2);
  border:1px solid #e5e7eb; border-radius:var(--r-sm);
  width:44px; height:44px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:var(--shadow-sm);
  transition: background .15s ease;
}
.icon-btn:active { background: var(--green-50); }
.icon-btn i { width:18px; height:18px; stroke-width:2; pointer-events:none; }

.add-btn {
  background: linear-gradient(135deg, var(--green-500), var(--green-600));
  color:var(--white); border:none; border-radius:var(--r-sm);
  width:44px; height:44px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0;
  box-shadow: var(--shadow-green);
}
.add-btn i { width:22px; height:22px; stroke-width:2.5; pointer-events:none; }

/* ===== INPUTS ===== */
input, select, textarea {
  background: var(--white); border:1.5px solid #e5e7eb;
  border-radius:var(--r-sm); padding:13px 14px; color:var(--text); font-size:14px;
  width:100%; font-family:var(--font-b); transition:border-color .2s ease, box-shadow .2s ease;
}
input:focus,textarea:focus,select:focus { outline:none; border-color:var(--green-500); box-shadow:0 0 0 3px rgba(34,197,94,.12); }
input::placeholder,textarea::placeholder { color:var(--text-3); }
input[type="number"] { -moz-appearance:textfield; }
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; }

/* ===== FILTERS ===== */
.fb {
  padding:8px 18px; border-radius:50px; border:1.5px solid #e5e7eb;
  font-size:13px; font-weight:600; cursor:pointer;
  background:var(--white); color:var(--text-2); white-space:nowrap;
  font-family:var(--font-b); transition:all .15s ease; min-height:36px;
  box-shadow: var(--shadow-sm);
}
.fb.on {
  background: linear-gradient(135deg, var(--green-500), var(--green-600));
  color:var(--white); border-color:transparent;
  box-shadow: var(--shadow-green);
}

/* ===== CHECKBOXES ===== */
.ck { display:flex; align-items:center; gap:12px; padding:12px 0; font-size:14px; cursor:pointer; border-bottom:1px solid #f1f5f9; min-height:44px; }
.ck:last-child { border-bottom:none; }
.cx {
  width:22px; height:22px; border-radius:7px; border:2px solid #d1d5db;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:all .15s ease;
}
.cx.dn { background: linear-gradient(135deg, var(--green-500), var(--green-600)); border-color:var(--green-500); }
.cx.dn i { width:14px; height:14px; color:var(--white); stroke-width:3; }

/* ===== BADGES ===== */
.bg { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:50px; font-size:12px; font-weight:600; }
.bg i { width:14px; height:14px; stroke-width:2; }
.bg-time { background:#ecfdf5; color:var(--green-700); }
.bg-cal { background:var(--amber-light); color:#b45309; }
.bg-type { background:var(--green-100); color:var(--green-700); text-transform:capitalize; }
.bg-quick { background:#f0fdf4; color:var(--green-600); }

/* ===== MACRO BOXES ===== */
.mx {
  background: var(--white); border-radius:var(--r-sm);
  padding:16px 10px; text-align:center; border:1px solid #f1f5f9;
  box-shadow: var(--shadow-sm);
}
.mx-val { font-family:var(--font-h); font-weight:700; font-size:22px; line-height:1; }
.mx-label { font-size:11px; color:var(--text-3); margin-top:4px; font-weight:500; }
.mx-protein .mx-val { color:var(--green-600); }
.mx-carbs .mx-val { color:var(--amber); }
.mx-fat .mx-val { color:var(--rose); }

/* ===== STEP NUMBERS ===== */
.sn {
  width:28px; height:28px; border-radius:50%;
  background: linear-gradient(135deg, var(--green-500), var(--green-600));
  color:var(--white); display:inline-flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; flex-shrink:0; font-family:var(--font-h);
}

/* ===== FIELD LABEL ===== */
.field-label { font-size:11px; color:var(--text-3); font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; display:block; font-family:var(--font-h); }

/* ===== SEARCH ===== */
.search-wrap { position:relative; margin-bottom:14px; }
.search-wrap i.search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:var(--text-3); stroke-width:2; pointer-events:none; }
.search-wrap input { padding-left:42px; background:var(--green-50); border-color:transparent; }
.search-wrap input:focus { background:var(--white); border-color:var(--green-500); }

/* ===== FILTER ROW ===== */
.filter-row { display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; margin-bottom:10px; scrollbar-width:none; }
.filter-row::-webkit-scrollbar { display:none; }

/* ===== RECIPE CARD ===== */
.recipe-card-type { font-size:10px; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; display:flex; align-items:center; gap:5px; }
.recipe-card-type i { width:13px; height:13px; stroke-width:2; color:var(--green-500); }
.recipe-name { font-family:var(--font-h); font-weight:600; font-size:15px; line-height:1.35; color:var(--text); }
.recipe-meta { display:flex; gap:12px; margin-top:6px; font-size:12px; color:var(--text-3); font-weight:500; }
.recipe-meta span { display:flex; align-items:center; gap:3px; }
.recipe-meta i { width:13px; height:13px; stroke-width:2; }
.recipe-count { font-size:13px; color:var(--text-3); font-weight:500; margin-bottom:10px; }

/* ===== DETAIL ===== */
.badges-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.macro-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:24px; }
.ing-row { display:flex; justify-content:space-between; padding:10px 0; font-size:14px; border-bottom:1px solid #f1f5f9; }
.ing-row:last-child { border-bottom:none; }
.ing-qty { color:var(--text-2); font-weight:500; }
.step-row { display:flex; gap:12px; padding:12px 0; font-size:14px; line-height:1.5; border-bottom:1px solid #f1f5f9; }
.step-row:last-child { border-bottom:none; }

/* ===== FRIDGE ===== */
.fridge-item { display:flex; justify-content:space-between; align-items:center; cursor:default; }
.fridge-remove { background:none; border:none; color:var(--rose); cursor:pointer; padding:8px; border-radius:var(--r-sm); min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; }
.fridge-remove i { width:18px; height:18px; stroke-width:2; pointer-events:none; }

/* ===== EMPTY STATE ===== */
.empty-state { text-align:center; padding:50px 20px; }
.empty-icon { margin-bottom:16px; }
.empty-icon i { width:56px; height:56px; color:var(--green-300); stroke-width:1.2; }
.empty-title { font-family:var(--font-h); font-size:18px; font-weight:600; color:var(--text-2); margin-bottom:4px; }
.empty-sub { font-size:13px; color:var(--text-3); }

/* ===== SHOP ===== */
.shop-count { font-size:13px; color:var(--text-3); margin-top:4px; font-weight:500; }

/* ===== FORMS ===== */
.form-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.form-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.form-stack { display:flex; flex-direction:column; gap:14px; }

/* ===================================================
   HOME SCREEN
   =================================================== */

/* Hero gradient top section */
.home-hero {
  background: linear-gradient(160deg, #f0fdf4 0%, #dcfce7 30%, #bbf7d0 60%, #dcfce7 100%);
  margin: -20px -18px 0;
  padding: 24px 20px 28px;
  border-radius: 0 0 32px 32px;
  position: relative;
  overflow: hidden;
}
.home-hero::before {
  content: '';
  position: absolute;
  top: -60px; right: -40px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(34,197,94,.2) 0%, transparent 70%);
  pointer-events: none;
}
.home-hero::after {
  content: '';
  position: absolute;
  bottom: -30px; left: -30px;
  width: 150px; height: 150px;
  background: radial-gradient(circle, rgba(74,222,128,.15) 0%, transparent 70%);
  pointer-events: none;
}

.home-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; position:relative; }
.greeting-hello { font-family:var(--font-h); font-size:14px; font-weight:500; color:var(--green-700); }
.greeting-name { font-family:var(--font-h); font-size:26px; font-weight:800; color:var(--green-900); line-height:1.15; margin-top:2px; }
.greeting-name span { background: linear-gradient(135deg, var(--green-600), var(--green-500)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.header-avatar {
  width:44px; height:44px; border-radius:50%;
  background:var(--white); border:2px solid var(--green-200);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; margin-top:4px;
  box-shadow: var(--shadow-sm);
}
.header-avatar i { width:20px; height:20px; color:var(--green-600); stroke-width:1.8; }

/* Daily Summary Card */
.daily-summary {
  background: var(--white);
  border-radius: var(--r-xl);
  padding: 20px;
  box-shadow: var(--shadow-md);
  border: 1px solid rgba(34,197,94,.08);
  position: relative;
}

.summary-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
.summary-day { font-family:var(--font-h); font-size:12px; font-weight:700; color:var(--green-600); text-transform:uppercase; letter-spacing:.06em; }
.summary-cal-row { display:flex; align-items:baseline; gap:4px; margin-top:4px; }
.summary-cal { font-family:var(--font-h); font-size:38px; font-weight:800; color:var(--text); line-height:1; }
.summary-cal-unit { font-size:14px; font-weight:600; color:var(--text-3); }
.summary-ring { width:56px; height:56px; position:relative; }
.summary-ring svg { transform:rotate(-90deg); }
.ring-label { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-h); font-size:13px; font-weight:700; color:var(--green-600); }

.macro-row { display:flex; gap:8px; }
.macro-pill {
  flex:1; background:var(--green-50); border-radius:var(--r-sm);
  padding:10px 12px; display:flex; flex-direction:column; gap:6px;
}
.macro-pill-top { display:flex; justify-content:space-between; align-items:center; }
.macro-pill-label { font-size:11px; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.04em; }
.macro-pill-val { font-family:var(--font-h); font-size:13px; font-weight:700; }
.macro-bar { height:4px; border-radius:4px; background:#e2e8f0; overflow:hidden; }
.macro-bar-fill { height:100%; border-radius:4px; transition:width .4s ease; }

/* Section with green left accent stripe */
.home-section {
  padding: 22px 18px 0;
}

/* ===== HORIZONTAL MEAL CARDS ===== */
.meals-scroll { display:flex; gap:14px; overflow-x:auto; margin:0 -18px; padding:0 18px 4px; scrollbar-width:none; }
.meals-scroll::-webkit-scrollbar { display:none; }

.meal-card-v {
  background: var(--white);
  border-radius: var(--r);
  padding: 16px;
  min-width: 190px;
  flex-shrink: 0;
  cursor: pointer;
  box-shadow: var(--shadow);
  border: 1px solid rgba(0,0,0,.04);
  transition: transform .15s ease, box-shadow .15s ease;
  position: relative;
  overflow: hidden;
}
.meal-card-v:active { transform:scale(.97); box-shadow: var(--shadow-md); }
.meal-card-v::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: var(--r) var(--r) 0 0;
}
.meal-card-v.breakfast-card::after { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
.meal-card-v.lunch-card::after { background: linear-gradient(90deg, var(--green-400), var(--green-600)); }
.meal-card-v.dinner-card::after { background: linear-gradient(90deg, #818cf8, #6366f1); }

.meal-icon-wrap { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; margin-bottom:12px; }
.meal-icon-wrap i { width:20px; height:20px; stroke-width:1.8; pointer-events:none; }
.meal-icon-wrap.breakfast { background:var(--amber-light); color:#b45309; }
.meal-icon-wrap.lunch { background:var(--green-100); color:var(--green-700); }
.meal-icon-wrap.dinner { background:#ede9fe; color:#7c3aed; }
.meal-type-label { font-size:10px; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
.meal-v-name { font-family:var(--font-h); font-size:14px; font-weight:600; color:var(--text); line-height:1.3; }
.meal-v-meta { display:flex; gap:10px; margin-top:8px; font-size:12px; color:var(--text-3); font-weight:500; }
.meal-v-meta span { display:flex; align-items:center; gap:3px; }
.meal-v-meta i { width:13px; height:13px; stroke-width:2; }
.meal-v-cal { font-family:var(--font-h); font-size:18px; font-weight:700; color:var(--green-600); margin-top:10px; }
.meal-v-cal small { font-size:11px; font-weight:500; color:var(--text-3); }

/* ===== CTA CARD ===== */
.cta-card {
  background: linear-gradient(135deg, var(--green-500), #16a34a, var(--green-600));
  border-radius: var(--r-xl);
  padding:18px 20px; margin-top:20px;
  cursor:pointer; display:flex; align-items:center; gap:14px; min-height:44px;
  box-shadow: var(--shadow-green);
  color: var(--white);
  position: relative;
  overflow: hidden;
}
.cta-card::before {
  content: '';
  position: absolute; top: -20px; right: -20px;
  width: 100px; height: 100px;
  background: radial-gradient(circle, rgba(255,255,255,.15) 0%, transparent 70%);
  pointer-events: none;
}
.cta-card-icon { width:48px; height:48px; border-radius:14px; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.cta-card-icon i { width:24px; height:24px; color:var(--white); stroke-width:2; }
.cta-card-text { flex:1; }
.cta-card-title { font-family:var(--font-h); font-size:15px; font-weight:700; color:var(--white); }
.cta-card-sub { font-size:12px; color:rgba(255,255,255,.8); margin-top:2px; }
.cta-card i.cta-arrow { width:20px; height:20px; color:rgba(255,255,255,.7); stroke-width:2; flex-shrink:0; }

/* ===== QUICK ACTIONS BENTO ===== */
.quick-actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.quick-btn {
  background: var(--white);
  border-radius:var(--r); padding:16px 14px;
  border:1px solid rgba(0,0,0,.04);
  cursor:pointer; display:flex; align-items:center; gap:10px;
  box-shadow: var(--shadow); min-height:44px;
  transition: transform .15s ease, box-shadow .15s ease;
}
.quick-btn:active { transform:scale(.97); box-shadow: var(--shadow-md); }
.quick-btn-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.quick-btn-icon i { width:20px; height:20px; stroke-width:1.8; }
.quick-btn-icon.i-green { background:var(--green-100); color:var(--green-700); }
.quick-btn-icon.i-emerald { background:#ecfdf5; color:#059669; }
.quick-btn-icon.i-amber { background:var(--amber-light); color:#b45309; }
.quick-btn-icon.i-lime { background:#f7fee7; color:#65a30d; }
.quick-btn-text { font-family:var(--font-h); font-size:13px; font-weight:600; color:var(--text); line-height:1.3; }
.quick-btn-sub { font-size:11px; font-weight:500; color:var(--text-3); margin-top:1px; }

/* ===== DAY CARD (Plan) ===== */
.day-card {
  border: 1px solid rgba(0,0,0,.04);
}
.day-name { font-family:var(--font-h); font-weight:600; font-size:16px; }
.day-cal { font-size:13px; font-weight:700; color:var(--green-600); }
.day-meals { margin-top:12px; border-top:1px solid #f1f5f9; padding-top:12px; }
.plan-meal { font-size:13px; padding:5px 0; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
.plan-meal:active { color:var(--green-600); }
.plan-meal-name { display:flex; align-items:center; gap:6px; flex:1; min-width:0; }
.plan-meal-name i { width:14px; height:14px; stroke-width:2; color:var(--green-500); flex-shrink:0; }

function go(){return{desayuno:pk(S.recs.filter(r=>r.t==="desayuno"),3),almuerzo:pk(S.recs.filter(r=>r.t==="almuerzo"),3),cena:pk(S.recs.filter(r=>r.t==="cena"),3)};}
if(!S.plan)S.plan=gp();if(!S.opts)S.opts=go();
function getGreeting(){const h=new Date().getHours();if(h<12)return"Buenos días";if(h<18)return"Buenas tardes";return"Buenas noches";}
function ic(name,cls){return'<i data-lucide="'+name+'"'+(cls?' class="'+cls+'"':'')+'></i>';}

function mc(r,showType,delay){
  return'<div class="card anim" style="margin-bottom:10px;cursor:pointer'+(delay?';animation-delay:'+delay+'ms':'')+'" onclick="S.did='+r.id+';dr()">'+
    (showType?'<div class="recipe-card-type">'+ic(MI[r.t])+' '+r.t[0].toUpperCase()+r.t.slice(1)+'</div>':'')+
    '<div class="recipe-name">'+esc(r.n)+'</div>'+
    '<div class="recipe-meta"><span>'+ic('flame')+' '+r.k+' kcal</span><span>'+ic('clock')+' '+r.m+' min</span>'+(r.q?'<span style="color:var(--green-600)">'+ic('zap')+' Rápida</span>':'')+'</div></div>';
}

function det(r){
  return'<div class="pg on"><div class="back-row" onclick="S.did=null;dr()">'+ic('chevron-left')+'<div class="back-title">'+esc(r.n)+'</div></div>'+
    '<div class="badges-row"><span class="bg bg-time">'+ic('clock')+' '+r.m+' min</span><span class="bg bg-cal">'+ic('flame')+' '+r.k+' kcal</span><span class="bg bg-type">'+ic(MI[r.t])+' '+r.t+'</span>'+(r.q?'<span class="bg bg-quick">'+ic('zap')+' Rápida</span>':'')+'</div>'+
    '<div class="macro-grid"><div class="mx mx-protein"><div class="mx-val">'+r.p+'g</div><div class="mx-label">Proteínas</div></div><div class="mx mx-carbs"><div class="mx-val">'+r.c+'g</div><div class="mx-label">Carbos</div></div><div class="mx mx-fat"><div class="mx-val">'+r.g+'g</div><div class="mx-label">Grasas</div></div></div>'+
    '<div class="section-label" style="margin-bottom:10px">Ingredientes</div><div class="card" style="padding:4px 16px;cursor:default">'+r.i.map(x=>'<div class="ing-row"><span>'+esc(x[0])+'</span><span class="ing-qty">'+esc(x[1])+' '+esc(x[2])+'</span></div>').join('')+'</div>'+
    '<div class="section-label" style="margin:20px 0 10px">Preparación</div><div class="card" style="padding:4px 16px;cursor:default">'+r.s.map((x,j)=>'<div class="step-row"><span class="sn">'+(j+1)+'</span><span>'+esc(x)+'</span></div>').join('')+'</div></div>';
}

function dr(){
  var a=$('app');
  if(S.did){var r=S.recs.find(x=>x.id===S.did);if(r){a.innerHTML=det(r);lucide.createIcons();return;}}
  if(S.add){a.innerHTML='<div class="pg on"><div class="back-row" onclick="S.add=false;dr()">'+ic('chevron-left')+'<div class="back-title">Nueva Receta</div></div><div class="form-stack"><div><label class="field-label">Nombre</label><input id="xn" placeholder="Ej: Pasta al pesto"/></div><div><label class="field-label">Tipo</label><select id="xt"><option value="desayuno">Desayuno</option><option value="almuerzo">Almuerzo</option><option value="cena">Cena</option></select></div><div class="form-grid-2"><div><label class="field-label">Tiempo (min)</label><input id="xm" type="number" inputmode="numeric" value="15"/></div><div><label class="field-label">Calorías</label><input id="xk" type="number" inputmode="numeric" value="400"/></div></div><div class="form-grid-3"><div><label class="field-label">Prot (g)</label><input id="xp" type="number" inputmode="numeric" value="20"/></div><div><label class="field-label">Carbs (g)</label><input id="xc" type="number" inputmode="numeric" value="30"/></div><div><label class="field-label">Grasas (g)</label><input id="xg" type="number" inputmode="numeric" value="15"/></div></div><div><label class="field-label">Ingredientes (coma)</label><textarea id="xi" rows="3" placeholder="Pollo 400g, arroz 1 taza"></textarea></div><div><label class="field-label">Instrucciones (línea)</label><textarea id="xs" rows="4" placeholder="Paso 1&#10;Paso 2"></textarea></div><button class="save-btn" onclick="ar()">Guardar receta</button></div></div>';lucide.createIcons();return;}
  var h='';

  if(S.tab==='home'){
    var dayIdx=new Date().getDay()===0?6:new Date().getDay()-1;var td=S.plan[dayIdx];
    var tot=(td.d?td.d.k:0)+(td.a?td.a.k:0)+(td.c?td.c.k:0);
    var tp=(td.d?td.d.p:0)+(td.a?td.a.p:0)+(td.c?td.c.p:0);
    var tc=(td.d?td.d.c:0)+(td.a?td.a.c:0)+(td.c?td.c.c:0);
    var tg=(td.d?td.d.g:0)+(td.a?td.a.g:0)+(td.c?td.c.g:0);
    var pct=Math.min(Math.round(tot/1800*100),100);
    h='<div class="pg on"><div class="home-hero"><div class="home-header"><div><div class="greeting-hello">'+getGreeting()+'</div><div class="greeting-name">¿Qué cocinamos <span>hoy</span>?</div></div><div class="header-avatar">'+ic('user')+'</div></div>'+
      '<div class="daily-summary"><div class="summary-top"><div><div class="summary-day">'+DY[dayIdx]+'</div><div class="summary-cal-row"><span class="summary-cal">'+tot.toLocaleString()+'</span><span class="summary-cal-unit">kcal</span></div></div><div class="summary-ring"><svg width="56" height="56" viewBox="0 0 56 56"><circle cx="28" cy="28" r="24" fill="none" stroke="#e2e8f0" stroke-width="4"/><circle cx="28" cy="28" r="24" fill="none" stroke="url(#ringGrad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="150.8" stroke-dashoffset="'+(150.8-(150.8*pct/100))+'"/><defs><linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#16a34a"/></linearGradient></defs></svg><span class="ring-label">'+pct+'%</span></div></div>'+
      '<div class="macro-row"><div class="macro-pill"><div class="macro-pill-top"><span class="macro-pill-label">Prot</span><span class="macro-pill-val" style="color:var(--green-700)">'+tp+'g</span></div><div class="macro-bar"><div class="macro-bar-fill" style="background:linear-gradient(90deg,var(--green-400),var(--green-600));width:'+Math.min(tp/120*100,100)+'%"></div></div></div><div class="macro-pill"><div class="macro-pill-top"><span class="macro-pill-label">Carbs</span><span class="macro-pill-val" style="color:#b45309">'+tc+'g</span></div><div class="macro-bar"><div class="macro-bar-fill" style="background:linear-gradient(90deg,#fbbf24,#f59e0b);width:'+Math.min(tc/200*100,100)+'%"></div></div></div><div class="macro-pill"><div class="macro-pill-top"><span class="macro-pill-label">Grasa</span><span class="macro-pill-val" style="color:var(--rose)">'+tg+'g</span></div><div class="macro-bar"><div class="macro-bar-fill" style="background:linear-gradient(90deg,#fb7185,#f43f5e);width:'+Math.min(tg/70*100,100)+'%"></div></div></div></div></div></div>'+
      '<div class="home-section"><div class="section-head"><span class="section-title">Comidas de hoy</span><span class="section-action" onclick="S.tab=\'plan\';dr()">Ver plan</span></div><div class="meals-scroll">';
    [{r:td.d,t:"desayuno"},{r:td.a,t:"almuerzo"},{r:td.c,t:"cena"}].forEach(function(meal){var r=meal.r;if(!r)return;h+='<div class="meal-card-v '+MCLASS[meal.t]+'" onclick="S.did='+r.id+';dr()"><div class="meal-icon-wrap '+MIC[meal.t]+'">'+ic(MI[meal.t])+'</div><div class="meal-type-label">'+meal.t[0].toUpperCase()+meal.t.slice(1)+'</div><div class="meal-v-name">'+esc(r.n)+'</div><div class="meal-v-meta"><span>'+ic('clock')+' '+r.m+' min</span>'+(r.q?'<span style="color:var(--green-600)">'+ic('zap')+' Rápida</span>':'')+'</div><div class="meal-v-cal">'+r.k+' <small>kcal</small></div></div>';});
    h+='</div><div class="cta-card" onclick="S.opts=go();S.tab=\'today\';dr()"><div class="cta-card-icon">'+ic('sparkles')+'</div><div class="cta-card-text"><div class="cta-card-title">¿Qué como hoy?</div><div class="cta-card-sub">Te sugiero 3 opciones por comida</div></div>'+ic('chevron-right','cta-arrow')+'</div>'+
      '<div style="margin-top:22px"><div class="section-head"><span class="section-title">Acceso rápido</span></div><div class="quick-actions"><div class="quick-btn" onclick="S.tab=\'recipes\';dr()"><div class="quick-btn-icon i-green">'+ic('book-open')+'</div><div><div class="quick-btn-text">Recetario</div><div class="quick-btn-sub">'+S.recs.length+' recetas</div></div></div><div class="quick-btn" onclick="S.tab=\'fridge\';dr()"><div class="quick-btn-icon i-emerald">'+ic('refrigerator')+'</div><div><div class="quick-btn-text">Mi nevera</div><div class="quick-btn-sub">'+S.fridge.length+' items</div></div></div></div></div></div></div>';
  }
  else if(S.tab==='today'){var o=S.opts;h='<div class="pg on"><div class="today-page-bg"><div class="top-row"><div class="section-title">¿Qué como hoy?</div><div class="icon-btn" onclick="S.opts=go();dr()">'+ic('refresh-cw')+'</div></div>';var delay=0;["desayuno","almuerzo","cena"].forEach(function(t){h+='<div class="section-label" style="margin:14px 0 8px">'+ic(MI[t])+' '+t[0].toUpperCase()+t.slice(1)+'</div>';(o[t]||[]).forEach(function(r){h+=mc(r,false,delay);delay+=50;});});h+='<div class="card" style="text-align:center;margin-top:16px;color:var(--text-2);font-weight:600;cursor:pointer" onclick="S.tab=\'home\';dr()">'+ic('chevron-left')+' Volver</div></div></div>';}
  else if(S.tab==='plan'){h='<div class="pg on"><div class="plan-page-bg"><div class="top-row"><div class="section-title">Plan Semanal</div><div class="icon-btn" onclick="S.plan=gp();saveState();dr()">'+ic('refresh-cw')+'</div></div>';S.plan.forEach(function(d,j){var tot=(d.d?d.d.k:0)+(d.a?d.a.k:0)+(d.c?d.c.k:0);h+='<div class="card day-card anim" style="margin-bottom:12px;cursor:pointer;animation-delay:'+(j*40)+'ms" onclick="S.exp['+j+']=!S.exp['+j+'];dr()"><div style="display:flex;justify-content:space-between;align-items:center"><span class="day-name">'+d.dy+'</span><span class="day-cal">'+tot+' kcal</span></div>'+(S.exp[j]?'<div class="day-meals"><div class="plan-meal" onclick="event.stopPropagation();S.did='+d.d.id+';dr()"><div class="plan-meal-name">'+ic('sunrise')+'<span>'+esc(d.d.n)+'</span></div><span class="plan-meal-cal">'+d.d.k+'</span></div><div class="plan-meal" onclick="event.stopPropagation();S.did='+d.a.id+';dr()"><div class="plan-meal-name">'+ic('chef-hat')+'<span>'+esc(d.a.n)+'</span></div><span class="plan-meal-cal">'+d.a.k+'</span></div><div class="plan-meal" onclick="event.stopPropagation();S.did='+d.c.id+';dr()"><div class="plan-meal-name">'+ic('moon')+'<span>'+esc(d.c.n)+'</span></div><span class="plan-meal-cal">'+d.c.k+'</span></div></div>':'')+'</div>';});h+='</div></div>';}
  else if(S.tab==='recipes'){var fl=S.recs.filter(function(r){if(S.flt!=="todas"&&r.t!==S.flt)return false;if(S.srch&&r.n.toLowerCase().indexOf(S.srch.toLowerCase())===-1)return false;return true;});h='<div class="pg on"><div class="recipes-page-bg"><div class="top-row"><div class="section-title">Recetario</div><div class="add-btn" onclick="S.add=true;dr()">'+ic('plus')+'</div></div><div class="search-wrap">'+ic('search','search-icon')+'<input id="sinp" placeholder="Buscar receta..." value="'+esc(S.srch)+'" oninput="S.srch=this.value;dr()"/></div><div class="filter-row">';["todas","desayuno","almuerzo","cena"].forEach(function(f){h+='<button class="fb '+(S.flt===f?'on':'')+'" onclick="S.flt=\''+f+'\';dr()">'+(f==='todas'?'Todas':f[0].toUpperCase()+f.slice(1))+'</button>';});h+='</div><div class="recipe-count">'+fl.length+' recetas</div>';fl.forEach(function(r,idx){h+=mc(r,true,idx*25);});h+='</div></div>';}
  else if(S.tab==='shop'){var it={};S.plan.forEach(function(d){[d.d,d.a,d.c].forEach(function(r){if(!r)return;r.i.forEach(function(x){var k=x[0].toLowerCase();if(!it[k])it[k]={n:x[0]};});});});var ls=Object.values(it);var checked=Object.keys(S.chk).filter(k=>S.chk[k]).length;h='<div class="pg on"><div class="shop-page-bg"><div style="margin-bottom:18px"><div class="section-title">Lista de Compras</div><div class="shop-count">Del plan semanal · '+ls.length+' ingredientes'+(checked>0?' · '+checked+' marcados':'')+'</div></div><div class="card" style="padding:4px 16px;cursor:default">';ls.forEach(function(x,j){h+='<div class="ck" onclick="S.chk['+j+']=!S.chk['+j+'];saveState();dr()"><div class="cx '+(S.chk[j]?'dn':'')+'">'+(S.chk[j]?ic('check'):'')+'</div><span style="'+(S.chk[j]?'text-decoration:line-through;color:var(--text-3)':'')+'">'+esc(x.n)+'</span></div>';});h+='</div></div></div>';}
  else if(S.tab==='fridge'){h='<div class="pg on"><div class="fridge-page-bg"><div class="section-title" style="margin-bottom:18px">Mi Nevera</div><div style="display:flex;gap:8px;margin-bottom:18px"><input id="fi" placeholder="Agregar ingrediente..." onkeydown="if(event.key===\'Enter\')af()"/><div class="add-btn" onclick="af()">'+ic('plus')+'</div></div>';if(S.fridge.length===0){h+='<div class="empty-state"><div class="empty-icon">'+ic('refrigerator')+'</div><div class="empty-title">Tu nevera está vacía</div><div class="empty-sub">Agrega ingredientes que tengas en casa</div></div>';}else{S.fridge.forEach(function(x,j){h+='<div class="card fridge-item anim" style="margin-bottom:8px;cursor:default;animation-delay:'+(j*25)+'ms"><span>'+esc(x)+'</span><button class="fridge-remove" onclick="S.fridge.splice('+j+',1);saveState();dr()">'+ic('x')+'</button></div>';});}h+='</div></div>';}

  a.innerHTML=h;lucide.createIcons();
  document.querySelectorAll('.tb').forEach(function(b){b.classList.toggle('on',b.dataset.t===S.tab||(S.tab==='today'&&b.dataset.t==='home'));});
  if(S.tab==='recipes'&&S.srch){var sinp=$('sinp');if(sinp){sinp.focus();sinp.setSelectionRange(sinp.value.length,sinp.value.length);}}
}
function af(){var inp=$('fi');if(!inp||!inp.value.trim())return;S.fridge.push(inp.value.trim());saveState();dr();}
function ar(){var n=$('xn');if(!n||!n.value)return;S.recs.push({id:S.recs.length+1,n:n.value,t:$('xt').value,m:+$('xm').value,k:+$('xk').value,p:+$('xp').value,c:+$('xc').value,g:+$('xg').value,i:$('xi').value.split(',').map(x=>[x.trim(),"",""]),s:$('xs').value.split('\n').filter(x=>x.trim()),q:+$('xm').value<=15?1:0});S.add=false;saveState();dr();}
document.querySelectorAll('.tb').forEach(function(b){b.addEventListener('click',function(){S.tab=b.dataset.t;S.did=null;S.add=false;dr();});});
dr();
</script>
</body>
</html>
