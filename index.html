    var fl=S.recs.filter(function(r){if(S.flt!=="todas"&&r.t!==S.flt)return false;if(S.srch&&r.n.toLowerCase().indexOf(S.srch.toLowerCase())===-1)return false;return true});
    h='<div class="pg on">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">'
    +'<div><div style="font-size:11px;color:#4ade80;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Biblioteca</div><h2 style="font-size:22px;font-weight:700;color:#f0f0f0">Recetario</h2></div>'
    +'<button style="background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:none;border-radius:12px;width:44px;height:44px;cursor:pointer;font-size:22px;font-weight:300;transition:all .2s;box-shadow:0 4px 14px rgba(34,197,94,0.3);display:flex;align-items:center;justify-content:center" onclick="S.add=true;dr()">＋</button>'
    +'</div>'
    +'<div style="position:relative;margin-bottom:12px">'
    +'<span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#555;font-size:15px;pointer-events:none">🔍</span>'
    +'<input id="sinp" style="padding-left:44px" placeholder="Buscar receta..." value="'+S.srch+'" oninput="S.srch=this.value;dr()"/>'
    +'</div>'
    +'<div class="filter-row" style="margin-bottom:14px">';
    ["todas","desayuno","almuerzo","cena"].forEach(function(f){h+='<button class="fb '+(S.flt===f?'on':'')+'" onclick="S.flt=\''+f+'\';dr()">'+(f==='todas'?'✦ Todas':f[0].toUpperCase()+f.slice(1))+'</button>'});
    h+='</div>'
    +'<div style="font-size:12px;color:#444;margin-bottom:12px;font-weight:500">'+fl.length+' recetas</div>';
    fl.forEach(function(r){h+=mc(r,true)});
    h+='</div>'
  }
  else if(S.tab==='shop'){
    var it={};
    S.plan.forEach(function(d){[d.d,d.a,d.c].forEach(function(r){if(!r)return;r.i.forEach(function(x){var k=x[0].toLowerCase();if(!it[k])it[k]={n:x[0],q:[]};if(x[1])it[k].q.push(x[1]+' '+x[2])})})});
    var ls=Object.values(it);
    var doneCount=ls.filter(function(_,j){return S.chk[j]}).length;
    var pct=ls.length>0?Math.round(doneCount/ls.length*100):0;
    h='<div class="pg on">'
    +'<div style="margin-bottom:16px"><div style="font-size:11px;color:#4ade80;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Plan semanal</div>'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-end"><h2 style="font-size:22px;font-weight:700;color:#f0f0f0">Lista de Compras</h2><span style="font-size:13px;color:#555;font-weight:600">'+doneCount+'/'+ls.length+'</span></div></div>'
    +'<div style="margin-bottom:4px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px;color:#555">Progreso</span><span style="font-size:11px;color:#4ade80;font-weight:600">'+pct+'%</span></div>'
    +'<div class="mbar-wrap" style="margin-bottom:16px;height:5px;border-radius:3px"><div class="mbar" style="width:'+pct+'%;background:linear-gradient(90deg,#16a34a,#4ade80)"></div></div>'
    +'<div class="cd" style="cursor:default;padding:8px 16px">';
    ls.forEach(function(x,j){
      h+='<div class="ck" onclick="S.chk['+j+']=!S.chk['+j+'];dr()">'
      +'<div class="cx '+(S.chk[j]?'dn':'')+'">'+(S.chk[j]?'<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><polyline points="2 6 5 9 10 3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>':'')+'</div>'
      +'<span style="'+(S.chk[j]?'text-decoration:line-through;color:#444':'color:#e5e5e5')+';font-size:14px;flex:1">'+x.n+'</span>'
      +(x.q.length?'<span style="font-size:11px;color:#555;flex-shrink:0">'+x.q[0]+'</span>':'')
      +'</div>'
    });
    h+='</div></div>'
  }
  else if(S.tab==='fridge'){
    h='<div class="pg on">'
    +'<div style="margin-bottom:20px"><div style="font-size:11px;color:#4ade80;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Ingredientes</div><h2 style="font-size:22px;font-weight:700;color:#f0f0f0">Mi Nevera</h2></div>'
    +'<div style="display:flex;gap:8px;margin-bottom:16px">'
    +'<input id="fi" placeholder="Agregar ingrediente..." onkeydown="if(event.key===\'Enter\')af()" style="flex:1"/>'
    +'<button style="background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:none;border-radius:12px;padding:0 20px;cursor:pointer;font-size:22px;font-weight:300;flex-shrink:0;box-shadow:0 4px 14px rgba(34,197,94,0.25);transition:all .2s;display:flex;align-items:center;justify-content:center" onclick="af()">＋</button>'
    +'</div>';
    if(S.fridge.length===0){
      h+='<div style="text-align:center;padding:60px 0 40px">'
      +'<div style="font-size:56px;margin-bottom:16px;filter:drop-shadow(0 0 16px rgba(34,197,94,0.18))">🧊</div>'
      +'<p style="font-size:15px;color:#555;font-weight:500">Tu nevera está vacía</p>'
      +'<p style="font-size:13px;color:#333;margin-top:6px">Agrega los ingredientes que tienes</p>'
      +'</div>'
    } else {
      S.fridge.forEach(function(x,j){
        h+='<div class="cd" style="display:flex;justify-content:space-between;align-items:center;cursor:default;padding:12px 14px;margin-bottom:8px">'
        +'<div style="display:flex;align-items:center;gap:10px">'
        +'<div style="width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,0.6);flex-shrink:0"></div>'
        +'<span style="font-size:14px;color:#e5e5e5;font-weight:500">'+x+'</span>'
        +'</div>'
        +'<button style="background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.15);color:#f87171;cursor:pointer;font-size:14px;padding:6px 11px;border-radius:8px;line-height:1;transition:all .2s;font-weight:600" onclick="S.fridge.splice('+j+',1);dr()">✕</button>'
        +'</div>'
      })
    }
    h+='</div>'
  }
  a.innerHTML=h;
  document.querySelectorAll('.tb').forEach(function(b){b.classList.toggle('on',b.dataset.t===S.tab||(S.tab==='today'&&b.dataset.t==='home'))});
}
function af(){var inp=$('fi');if(!inp||!inp.value.trim())return;S.fridge.push(inp.value.trim());dr()}
function ar(){var n=$('xn');if(!n||!n.value)return;S.recs.push({id:S.recs.length+1,n:n.value,t:$('xt').value,m:+$('xm').value,k:+$('xk').value,p:+$('xp').value,c:+$('xc').value,g:+$('xg').value,i:$('xi').value.split(',').map(function(x){return[x.trim(),"",""]}),s:$('xs').value.split('\n').filter(function(x){return x.trim()}),q:+$('xm').value<=15?1:0});S.add=false;dr()}
document.querySelectorAll('.tb').forEach(function(b){b.addEventListener('click',function(){S.tab=b.dataset.t;S.did=null;S.add=false;dr()})});
dr();
</script>
</body>
</html>
