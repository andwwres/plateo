if(!S.plan)S.plan=gp();if(!S.opts)S.opts=go();
const $=id=>document.getElementById(id);
const ME={desayuno:"☀️",almuerzo:"🍽️",cena:"🌙"};
function mc(r,st){return'<div class="cd" onclick="S.did='+r.id+';dr()">'+(st?'<div style="font-size:11px;color:#888;margin-bottom:3px">'+ME[r.t]+' '+r.t[0].toUpperCase()+r.t.slice(1)+'</div>':'')+'<div style="font-weight:600;font-size:14px">'+r.n+'</div><div style="display:flex;gap:12px;margin-top:5px;font-size:12px;color:#888"><span>'+r.k+' kcal</span><span>'+r.m+' min</span>'+(r.q?'<span style="color:#fbbf24">🔥 Rápida</span>':'')+'</div></div>'}
function det(r){return'<div class="pg on"><div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;cursor:pointer" onclick="S.did=null;dr()"><span style="font-size:24px">‹</span><h2 style="font-size:18px;font-weight:700">'+r.n+'</h2></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px"><span class="bg" style="background:#166534;color:#4ade80">⏱ '+r.m+' min</span><span class="bg" style="background:#7c2d12;color:#fb923c">🔥 '+r.k+' kcal</span><span class="bg" style="background:#1e3a5f;color:#60a5fa;text-transform:capitalize">'+r.t+'</span>'+(r.q?'<span class="bg" style="background:#854d0e;color:#fbbf24">⚡ Rápida</span>':'')+'</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px"><div class="mx"><div style="color:#4ade80;font-weight:700;font-size:18px">'+r.p+'g</div><div style="font-size:11px;color:#888">Proteínas</div></div><div class="mx"><div style="color:#facc15;font-weight:700;font-size:18px">'+r.c+'g</div><div style="font-size:11px;color:#888">Carbos</div></div><div class="mx"><div style="color:#f87171;font-weight:700;font-size:18px">'+r.g+'g</div><div style="font-size:11px;color:#888">Grasas</div></div></div><h3 style="color:#22c55e;font-weight:700;margin-bottom:10px">Ingredientes</h3><div class="cd" style="cursor:default">'+r.i.map(function(x){return'<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:14px"><span>'+x[0]+'</span><span style="color:#888">'+x[1]+' '+x[2]+'</span></div>'}).join('')+'</div><h3 style="color:#22c55e;font-weight:700;margin:16px 0 10px">Instrucciones</h3><div class="cd" style="cursor:default">'+r.s.map(function(x,j){return'<div style="display:flex;gap:10px;padding:6px 0;font-size:14px"><span class="sn">'+(j+1)+'</span><span>'+x+'</span></div>'}).join('')+'</div></div>'}
function dr(){
var a=$('app');
if(S.did){var r=S.recs.find(function(x){return x.id===S.did});if(r){a.innerHTML=det(r);return}}
if(S.add){a.innerHTML='<div class="pg on"><div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;cursor:pointer" onclick="S.add=false;dr()"><span style="font-size:24px">‹</span><h2 style="font-size:18px;font-weight:700">Nueva Receta</h2></div><div style="display:flex;flex-direction:column;gap:12px"><div><label style="font-size:12px;color:#888">Nombre</label><input id="xn" placeholder="Ej: Pasta al pesto"/></div><div><label style="font-size:12px;color:#888">Tipo</label><select id="xt"><option value="desayuno">Desayuno</option><option value="almuerzo">Almuerzo</option><option value="cena">Cena</option></select></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><label style="font-size:12px;color:#888">Tiempo (min)</label><input id="xm" type="number" value="15"/></div><div><label style="font-size:12px;color:#888">Calorías</label><input id="xk" type="number" value="400"/></div></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"><div><label style="font-size:12px;color:#888">Prot</label><input id="xp" type="number" value="20"/></div><div><label style="font-size:12px;color:#888">Carbs</label><input id="xc" type="number" value="30"/></div><div><label style="font-size:12px;color:#888">Grasas</label><input id="xg" type="number" value="15"/></div></div><div><label style="font-size:12px;color:#888">Ingredientes (coma)</label><textarea id="xi" rows="3" placeholder="Pollo 400g, arroz 1 taza"></textarea></div><div><label style="font-size:12px;color:#888">Instrucciones (línea)</label><textarea id="xs" rows="4" placeholder="Paso 1"></textarea></div><button class="bn" onclick="ar()">Guardar</button></div></div>';return}
var h='';
if(S.tab==='home'){var td=S.plan[new Date().getDay()===0?6:new Date().getDay()-1];var tot=(td.d?td.d.k:0)+(td.a?td.a.k:0)+(td.c?td.c.k:0);h='<div class="pg on"><div style="text-align:center;padding:16px 0"><h1 style="font-size:24px">🥗 Plateo</h1><p style="color:#888;font-size:14px;margin-top:4px">Tu plan de hoy</p></div><div class="cd" style="text-align:center;cursor:default"><span style="font-size:28px;font-weight:700;color:#22c55e">'+tot+'</span><span style="color:#888;margin-left:8px">kcal hoy</span></div><div style="font-size:11px;color:#888;margin:4px 0">☀️ Desayuno</div>'+mc(td.d,false)+'<div style="font-size:11px;color:#888;margin:4px 0">🍽️ Almuerzo</div>'+mc(td.a,false)+'<div style="font-size:11px;color:#888;margin:4px 0">🌙 Cena</div>'+mc(td.c,false)+'<button class="bng" style="margin-top:12px" onclick="S.opts=go();S.tab=\'today\';dr()">¿Qué como hoy? — Ver opciones</button></div>'}
else if(S.tab==='today'){var o=S.opts;h='<div class="pg on"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="font-size:20px;font-weight:700">¿Qué como hoy?</h2><button class="bnd" onclick="S.opts=go();dr()">🔄</button></div>';["desayuno","almuerzo","cena"].forEach(function(t){h+='<h3 style="color:#22c55e;font-weight:700;margin:12px 0 8px">'+ME[t]+' '+t[0].toUpperCase()+t.slice(1)+'</h3>';(o[t]||[]).forEach(function(r){h+=mc(r,false)})});h+='<button class="bnd" style="width:100%;margin-top:12px" onclick="S.tab=\'home\';dr()">← Volver</button></div>'}
else if(S.tab==='plan'){h='<div class="pg on"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="font-size:20px;font-weight:700">Plan Semanal</h2><button class="bnd" onclick="S.plan=gp();dr()">🔄</button></div>';S.plan.forEach(function(d,j){var tot=(d.d?d.d.k:0)+(d.a?d.a.k:0)+(d.c?d.c.k:0);h+='<div class="cd" onclick="S.exp['+j+']=!S.exp['+j+'];dr()"><div style="display:flex;justify-content:space-between"><span style="font-weight:700">'+d.dy+'</span><span style="font-size:13px;color:#22c55e">'+tot+' kcal</span></div>'+(S.exp[j]?'<div style="margin-top:10px;border-top:1px solid #2a2a2a;padding-top:10px"><div style="font-size:13px;padding:4px 0;cursor:pointer" onclick="event.stopPropagation();S.did='+d.d.id+';dr()">☀️ '+d.d.n+' <span style="color:#888">'+d.d.k+'kcal</span></div><div style="font-size:13px;padding:4px 0;cursor:pointer" onclick="event.stopPropagation();S.did='+d.a.id+';dr()">🍽️ '+d.a.n+' <span style="color:#888">'+d.a.k+'kcal</span></div><div style="font-size:13px;padding:4px 0;cursor:pointer" onclick="event.stopPropagation();S.did='+d.c.id+';dr()">🌙 '+d.c.n+' <span style="color:#888">'+d.c.k+'kcal</span></div></div>':'')+'</div>'});h+='</div>'}
else if(S.tab==='recipes'){var fl=S.recs.filter(function(r){if(S.flt!=="todas"&&r.t!==S.flt)return false;if(S.srch&&r.n.toLowerCase().indexOf(S.srch.toLowerCase())===-1)return false;return true});h='<div class="pg on"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="font-size:20px;font-weight:700">Recetario</h2><button style="background:#22c55e;color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:16px" onclick="S.add=true;dr()">＋</button></div><div style="position:relative;margin-bottom:12px"><span style="position:absolute;left:12px;top:12px;color:#888">🔍</span><input id="sinp" style="padding-left:36px" placeholder="Buscar receta..." value="'+S.srch+'" oninput="S.srch=this.value;dr()"/></div><div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px">';["todas","desayuno","almuerzo","cena"].forEach(function(f){h+='<button class="fb '+(S.flt===f?'on':'')+'" onclick="S.flt=\''+f+'\';dr()">'+(f==='todas'?'Todas':f[0].toUpperCase()+f.slice(1))+'</button>'});h+='</div><div style="font-size:13px;color:#888;margin-bottom:8px">'+fl.length+' recetas</div>';fl.forEach(function(r){h+=mc(r,true)});h+='</div>'}
else if(S.tab==='shop'){var it={};S.plan.forEach(function(d){[d.d,d.a,d.c].forEach(function(r){if(!r)return;r.i.forEach(function(x){var k=x[0].toLowerCase();if(!it[k])it[k]={n:x[0],q:[]};if(x[1])it[k].q.push(x[1]+' '+x[2])})})});var ls=Object.values(it);h='<div class="pg on"><h2 style="font-size:20px;font-weight:700;margin-bottom:4px">Lista de Compras</h2><p style="font-size:13px;color:#888;margin-bottom:16px">Del plan semanal · '+ls.length+' items</p><div class="cd" style="cursor:default">';ls.forEach(function(x,j){h+='<div class="ck" onclick="S.chk['+j+']=!S.chk['+j+'];dr()"><div class="cx '+(S.chk[j]?'dn':'')+'">'+(S.chk[j]?'✓':'')+'</div><span style="'+(S.chk[j]?'text-decoration:line-through;color:#555':'')+'">'+x.n+'</span></div>'});h+='</div></div>'}
else if(S.tab==='fridge'){h='<div class="pg on"><h2 style="font-size:20px;font-weight:700;margin-bottom:16px">Mi Nevera</h2><div style="display:flex;gap:8px;margin-bottom:16px"><input id="fi" placeholder="Agregar ingrediente..." onkeydown="if(event.key===\'Enter\')af()"/><button style="background:#22c55e;color:#fff;border:none;border-radius:10px;padding:0 16px;cursor:pointer;font-size:20px;flex-shrink:0" onclick="af()">＋</button></div>';if(S.fridge.length===0){h+='<div style="text-align:center;padding:60px 0;color:#555"><div style="font-size:48px;margin-bottom:12px">🧊</div><p>Tu nevera está vacía</p><p style="font-size:13px;margin-top:4px">Agrega ingredientes</p></div>'}else{S.fridge.forEach(function(x,j){h+='<div class="cd" style="display:flex;justify-content:space-between;align-items:center;cursor:default"><span>'+x+'</span><button style="background:none;border:none;color:#f87171;cursor:pointer;font-size:18px;padding:4px 8px" onclick="S.fridge.splice('+j+',1);dr()">✕</button></div>'})}h+='</div>'}
a.innerHTML=h;
document.querySelectorAll('.tb').forEach(function(b){b.classList.toggle('on',b.dataset.t===S.tab||(S.tab==='today'&&b.dataset.t==='home'))});
}
function af(){var inp=$('fi');if(!inp||!inp.value.trim())return;S.fridge.push(inp.value.trim());dr()}
function ar(){var n=$('xn');if(!n||!n.value)return;S.recs.push({id:S.recs.length+1,n:n.value,t:$('xt').value,m:+$('xm').value,k:+$('xk').value,p:+$('xp').value,c:+$('xc').value,g:+$('xg').value,i:$('xi').value.split(',').map(function(x){return[x.trim(),"",""]}),s:$('xs').value.split('\n').filter(function(x){return x.trim()}),q:+$('xm').value<=15?1:0});S.add=false;dr()}
document.querySelectorAll('.tb').forEach(function(b){b.addEventListener('click',function(){S.tab=b.dataset.t;S.did=null;S.add=false;dr()})});
dr();
</script>
